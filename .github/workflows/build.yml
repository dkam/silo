name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed to create releases on tag pushes

jobs:
  # One lint/test pass up front; no point building four platforms if the
  # tree is already broken.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test
        # -p 1: several fileserver test packages share /tmp/conf/seafile-data
        # with the same repo ID, so parallel package execution races. Proper
        # fix is t.TempDir() in those tests.
        run: go test -p 1 ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute version
        id: version
        run: echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"

      - name: Build silo
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          out="dist/silo-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -trimpath \
            -ldflags "-s -w -X main.Version=${{ steps.version.outputs.version }}" \
            -o "$out" ./cmd/silo
          # Run the binary only on matching host
          if [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "amd64" ]; then
            "$out" version
          fi
          # Tarball with a stable inner filename (`silo`) so users get
          # `./silo` after `tar xf`, regardless of platform.
          tmp=$(mktemp -d)
          cp "$out" "$tmp/silo"
          tar -C "$tmp" -czf "$out.tar.gz" silo
          (cd dist && sha256sum "$(basename "$out").tar.gz" > "$(basename "$out").tar.gz.sha256")
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: silo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
