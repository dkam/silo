name: golangci-lint

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

# If a tag push and a branch push land close together on the same
# commit (typical when cutting a release: `git push` then `git push
# --tags`), collapse to a single lint run for that commit.
concurrency:
  group: lint-${{ github.sha }}
  cancel-in-progress: true

jobs:
  golangci-silo:
    name: lint silo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # goinstall builds golangci-lint from source using the runner's
          # Go toolchain, so it stays compatible with our go.mod's Go
          # version instead of the prebuilt binary's (which lags behind).
          version: latest
          install-mode: goinstall
          args: --timeout=5m
